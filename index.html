<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/jpeg" href="/images/ayro/logo.jpeg" />
    <link rel="preload" as="image" href="/images/ayro/logo.jpeg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="AYRO — premium streetwear tees. Essentials, graphics, and limited drops." />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet" />
    <title>AYRO — Premium Streetwear</title>
    <script>
      (function () {
        var stored = localStorage.getItem('ayro-theme');
        var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        var dark = stored === 'dark' || (stored !== 'light' && prefersDark);
        if (dark) document.documentElement.classList.add('dark');
        if (!sessionStorage.getItem('ayro-intro-seen') || location.search.indexOf('intro') !== -1) {
          document.documentElement.classList.add('splash-active');
        }
      })();
    </script>
    <style>
      html.splash-active,
      html.splash-active body {
        overflow: hidden;
      }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
